  <script>
    const SHEET_ID = '1iKeamsUBU8DIXbHgrNJQzurIqLSDbKV3c3s_mBXGysw';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    const ICONS = {
      amazon: '🛒',
      shopmy: '👗',
      blog: `<svg viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
      website: `<span style="font-family:'Playfair Display',serif;font-weight:600;font-size:1rem;color:#1a1a2e;letter-spacing:-0.02em;">MC</span>`,
      agency: `<svg viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      'collabs & inquiries': '✉️',
    };

    function getIcon(label) {
      return ICONS[label.toLowerCase()] || '🔗';
    }

    async function loadLinks() {
      const container = document.getElementById('links-list');
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const cols = json.table.cols.map(c => c.label);
        const rows = json.table.rows.map(r =>
          Object.fromEntries(cols.map((col, i) => [col, r.c[i] ? String(r.c[i].v) : '']))
        );
        const active = rows.filter(r => !r.Active || r.Active.toLowerCase() !== 'false');

        container.innerHTML = '';
        active.forEach((row, i) => {
          const icon = getIcon(row.Label || '');
          const card = document.createElement('a');
          card.href = row.URL || '#';
          card.className = 'link-card';
          card.style.animationDelay = `${i * 80}ms`;
          if (row.URL && !row.URL.startsWith('mailto:')) {
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
          }
          card.innerHTML = `
            <div class="link-icon">${icon}</div>
            <div class="link-text">
              <div class="link-title">${row.Title || ''}</div>
              ${row.Label ? `<div class="link-label">${row.Label}</div>` : ''}
            </div>
            <div class="link-arrow">›</div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = '<p class="loading">Could not load links. Please try again.</p>';
      }
    }

    loadLinks();
  </script>
